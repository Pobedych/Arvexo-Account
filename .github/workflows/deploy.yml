name: Deploy Arvexo Account

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: arvexo-account-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/arvexo_account_deploy
          chmod 600 ~/.ssh/arvexo_account_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Package application
        shell: bash
        run: |
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='backend/.venv' \
            --exclude='backend/.venv312' \
            --exclude='frontend/node_modules' \
            -czf /tmp/arvexo-account.tar.gz .

      - name: Upload application
        shell: bash
        run: |
          scp \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/arvexo_account_deploy \
            /tmp/arvexo-account.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/arvexo-account.tar.gz"

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          ssh \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -i ~/.ssh/arvexo_account_deploy \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail
            mkdir -p "${{ secrets.VPS_PROJECT_PATH }}"
            tar -xzf /tmp/arvexo-account.tar.gz -C "${{ secrets.VPS_PROJECT_PATH }}"
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            test -f .env || cp .env.example .env
            # Ensure NGINX_PORT is set to 9100 (host port 80 is taken by system nginx).
            if grep -q '^NGINX_PORT=' .env; then
              sed -i 's/^NGINX_PORT=.*/NGINX_PORT=9100/' .env
            else
              echo 'NGINX_PORT=9100' >> .env
            fi
            docker compose pull postgres redis nginx || true
            if ! docker compose up -d --build; then
              echo "Deployment failed! Printing backend logs for debugging:"
              docker compose logs backend
              exit 1
            fi
            docker compose ps
          EOF
